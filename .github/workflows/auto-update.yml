name: Auto Update Casks

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update clashmac.rb
        run: |
          REPO="666OS/ClashMac"
          CASK_FILE="Casks/clashmac.rb"
          LATEST=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | head -50)
          TAG=$(echo "$LATEST" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          if [ -z "$TAG" ]; then
            TAG=$(curl -s "https://api.github.com/repos/$REPO/releases" | grep '"tag_name' | head -1 | cut -d'"' -f4)
          fi
          CURRENT_TAG=$(grep 'version "' "$CASK_FILE" | head -1 | cut -d'"' -f2)
          echo "Latest: $TAG| Current: $CURRENT_TAG"
          if [ "$TAG" != "$CURRENT_TAG" ] && [ -n "$TAG" ]; then
            ASSETS=$(curl -s "https://api.github.com/repos/$REPO/releases/tags/$TAG" | grep -A5 'browser_download_url')
            ARM_URL=$(echo "$ASSETS" | grep 'arm64.zip' | head -1 | cut -d'"' -f4)
            X86_URL=$(echo "$ASSETS" | grep 'x86_64.zip' | head -1 | cut -d'"' -f4)
            ARM_SHA=$(curl -L "$ARM_URL" | sha256sum | cut -d' ' -f1)
            X86_SHA=$(curl -L "$X86_URL" | sha256sum | cut -d' ' -f1)
            echo "ARM64: $ARM_SHA | X86_64: $86_SHA"
            cat > "$CASK_FILE" <<EOF
cask "clashmac" do
  arch arm: "arm64", intel: "x86_64"
  version "$TAG"
  url "https://github.com/$REPO/releases/download/#{version}/ClashMac-#{version}-macos-#{arch}.zip",
      verified: "github.com/$REPO/"
  name "ClashMac"
  desc "Native Proxy Experience Built for macOS"
  homepage "https://clashmac.app/"
  livecheck do
    strategy :github_latest
    regex(/^(\d+\.\d+(?:-\w+(?:\.\d+)?)?)$/)
  end
  auto_updates true
  depends_on macos: ">= :monterey"
  app "ClashMac.app"
  zap trash: [
    "~/Library/Application Support/clashmac",
    "~/Library/Caches/com.clashmac.app",
    "~/Library/HTTPStorages/com.clashmac.app",
    "~/Library/Preferences/com.clashmac.app.plist",
    "~/Library/Saved Application State/com.clashmac.app.savedState",
  ]
end
EOF
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add "$CASK_FILE"
            git commit -m "Update clashmac to $TAG"
            git push
            echo "来或变: $TAG"
          else
            echo "　不丰剈的成"
          fi
