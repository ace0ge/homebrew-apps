name: Auto Update Casks

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update clashmac.rb
        run: |
          REPO="666OS/ClashMac"
          CASK_FILE="Casks/clashmac.rb"
          
          # Get latest release tag
          TAG=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          
          # Fallback to releases list if latest fails
          if [ -z "$TAG" ]; then
            TAG=$(curl -s "https://api.github.com/repos/$REPO/releases" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          fi
          
          # Get current version from cask file
          CURRENT_TAG=$(grep 'version "' "$CASK_FILE" | head -1 | cut -d'"' -f2)
          
          echo "Latest: $TAG | Current: $CURRENT_TAG"
          
          if [ "$TAG" != "$CURRENT_TAG" ] && [ -n "$TAG" ]; then
            echo "Updating from $CURRENT_TAG to $TAG..."
            
            # Update version in cask file
            sed -i "s/version \"$CURRENT_TAG\"/version \"$TAG\"/" "$CASK_FILE"
            
            # Update app path with new version
            sed -i "s/ClashMac-\$CURRENT_TAG-macos/ClashMac-\$TAG-macos/g" "$CASK_FILE"
            sed -i "s/ClashMac-${CURRENT_TAG}-macos/ClashMac-${TAG}-macos/g" "$CASK_FILE"
            
            # Commit and push
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add "$CASK_FILE"
            git commit -m "Update clashmac to $TAG"
            git push
            
            echo "Updated to $TAG"
          else
            echo "No update needed"
          fi
